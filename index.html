<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёт: время сотрудников по сделкам</title>
<script src="//api.bitrix24.com/api/v1/"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14px; color: #333; background: #f5f5f5; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #1a1a1a; }

  .panel { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; padding: 16px 20px; margin-bottom: 16px; }
  .panel-title { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  .filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 12px; color: #666; }
  .filter-group input[type="date"],
  .filter-group select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; color: #333; background: #fff; min-width: 160px; }
  .filter-group input[type="date"]:focus,
  .filter-group select:focus { outline: none; border-color: #1565c0; }

  .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: #1565c0; color: #fff; }
  .btn-primary:hover { background: #1252a3; }
  .btn-primary:disabled { background: #90afd4; cursor: not-allowed; }
  .btn-secondary { background: #e8f0fe; color: #1565c0; border: 1px solid #c5d8f8; }
  .btn-secondary:hover { background: #d0e3fc; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .progress-wrap { display: none; margin-top: 12px; }
  .progress-bar-bg { background: #e0e0e0; border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar { background: #1565c0; height: 100%; border-radius: 4px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 12px; color: #666; margin-top: 5px; }

  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 18px; flex: 1; min-width: 140px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; color: #1565c0; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #f0f4ff; }
  th { padding: 10px 12px; text-align: left; font-weight: 600; color: #444; border-bottom: 2px solid #dde4f5; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { background: #e0e9ff; }
  th.sort-asc::after { content: " ▲"; font-size: 10px; color: #1565c0; }
  th.sort-desc::after { content: " ▼"; font-size: 10px; color: #1565c0; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .employee-cell { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #c5d8f8; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #1565c0; flex-shrink: 0; }
  .deal-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-blue { background: #e8f0fe; color: #1565c0; }

  .error-msg { background: #fff3f3; border: 1px solid #f5c6c6; color: #c0392b; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-top: 10px; display: none; }
  .empty-msg { text-align: center; color: #999; padding: 30px 0; font-size: 13px; }

  .action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #resultPanel { display: none; }
</style>
</head>
<body>

<h1>Время сотрудников по сделкам</h1>

<!-- Фильтры -->
<div class="panel">
  <div class="panel-title">Период и фильтры</div>
  <div class="filters">
    <div class="filter-group">
      <label>Дата с</label>
      <input type="date" id="dateFrom" />
    </div>
    <div class="filter-group">
      <label>Дата по</label>
      <input type="date" id="dateTo" />
    </div>
    <div class="filter-group">
      <label>Сотрудник</label>
      <select id="userFilter">
        <option value="">— Все —</option>
      </select>
    </div>
    <div class="filter-group" style="flex-direction:row; gap:8px; padding-top:18px;">
      <button class="btn btn-primary" id="btnLoad" onclick="loadReport()">Сформировать</button>
    </div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Загрузка данных...</div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- Результат -->
<div id="resultPanel">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Событий найдено</div><div class="stat-value" id="statEvents">0</div></div>
    <div class="stat-card"><div class="stat-label">Сотрудников</div><div class="stat-value" id="statUsers">0</div></div>
    <div class="stat-card"><div class="stat-label">Сделок</div><div class="stat-value" id="statDeals">0</div></div>
    <div class="stat-card"><div class="stat-label">Всего часов</div><div class="stat-value" id="statHours">0</div></div>
  </div>

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
      <div class="panel-title" style="margin:0;">Детализация</div>
      <div class="action-row">
        <select id="groupBy" onchange="renderTable()" style="padding:6px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px;">
          <option value="event">Каждое событие</option>
          <option value="user_deal">Сотрудник + Сделка</option>
          <option value="user">Сотрудник (итого)</option>
          <option value="deal">Сделка (итого)</option>
        </select>
        <button class="btn btn-secondary" id="btnExport" onclick="exportCSV()">Скачать CSV</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="reportTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var BX24_READY = false;
var rawData = [];
var usersMap = {};
var dealsMap = {};
var sortCol = null;
var sortDir = 1;

// Инициализация дат
(function() {
  var now = new Date();
  var firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('dateFrom').value = fmt(firstDay);
  document.getElementById('dateTo').value = fmt(now);
  function fmt(d) {
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }
  function pad(n) { return n < 10 ? '0'+n : n; }
})();

// BX24 init
if (typeof BX24 !== 'undefined') {
  BX24.init(function() {
    BX24_READY = true;
    loadUsers();
  });
} else {
  // dev fallback — показываем демо
  BX24_READY = false;
  loadDemoData();
}

function loadUsers() {
  callAll('user.get', { ACTIVE: true, select: ['ID','NAME','LAST_NAME','SECOND_NAME'] }, function(users) {
    var sel = document.getElementById('userFilter');
    users.forEach(function(u) {
      usersMap[u.ID] = fullName(u);
      var opt = document.createElement('option');
      opt.value = u.ID;
      opt.textContent = fullName(u);
      sel.appendChild(opt);
    });
  });
}

function fullName(u) {
  return [u.LAST_NAME, u.NAME, u.SECOND_NAME].filter(Boolean).join(' ') || ('Пользователь #' + u.ID);
}

function setProgress(pct, text) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

function hideProgress() {
  document.getElementById('progressWrap').style.display = 'none';
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function loadReport() {
  hideError();
  rawData = [];
  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo = document.getElementById('dateTo').value;
  var userFilter = document.getElementById('userFilter').value;

  if (!dateFrom || !dateTo) { showError('Укажите период.'); return; }
  if (dateFrom > dateTo) { showError('Дата "с" не может быть позже даты "по".'); return; }

  if (!BX24_READY) { loadDemoData(); return; }

  document.getElementById('btnLoad').disabled = true;
  document.getElementById('resultPanel').style.display = 'none';
  setProgress(5, 'Загрузка событий календаря...');

  var filter = {
    '>DATE_FROM': dateFrom + 'T00:00:00',
    '<DATE_TO': dateTo + 'T23:59:59',
    type: 'user',
    SKIP_TIME: 'N'
  };
  if (userFilter) filter.OWNER_ID = userFilter;

  callAll('calendar.event.get', filter, function(events) {
    setProgress(40, 'Фильтрация событий с привязкой к CRM...');

    var crmEvents = events.filter(function(e) {
      return e.CRM && e.CRM.length > 0 && e.DATE_FROM && e.DATE_TO;
    });

    if (crmEvents.length === 0) {
      hideProgress();
      document.getElementById('btnLoad').disabled = false;
      showError('За выбранный период не найдено событий с привязкой к сделкам.');
      return;
    }

    setProgress(55, 'Загрузка данных сделок...');

    var dealIds = [];
    crmEvents.forEach(function(e) {
      (e.CRM || []).forEach(function(c) {
        if (c.TYPE === 'DEAL' && dealIds.indexOf(c.ID) === -1) dealIds.push(c.ID);
      });
    });

    loadDeals(dealIds, function() {
      setProgress(85, 'Загрузка данных сотрудников...');

      var ownerIds = [];
      crmEvents.forEach(function(e) {
        var id = String(e.OWNER_ID || e.USER_ID || '');
        if (id && ownerIds.indexOf(id) === -1) ownerIds.push(id);
      });

      loadMissingUsers(ownerIds, function() {
        setProgress(95, 'Формирование отчёта...');
        rawData = buildRows(crmEvents);
        setProgress(100, 'Готово');
        setTimeout(function() {
          hideProgress();
          document.getElementById('btnLoad').disabled = false;
          document.getElementById('resultPanel').style.display = 'block';
          updateStats(rawData);
          sortCol = null;
          renderTable();
        }, 300);
      });
    });
  }, function(err) {
    hideProgress();
    document.getElementById('btnLoad').disabled = false;
    showError('Ошибка при загрузке данных: ' + (err || 'неизвестная ошибка'));
  });
}

function buildRows(events) {
  var rows = [];
  events.forEach(function(e) {
    var userId = String(e.OWNER_ID || e.USER_ID || '');
    var dfrom = new Date(e.DATE_FROM);
    var dto = new Date(e.DATE_TO);
    var durMin = Math.round((dto - dfrom) / 60000);
    if (durMin <= 0) return;

    var crmLinks = (e.CRM || []).filter(function(c) { return c.TYPE === 'DEAL'; });
    if (!crmLinks.length) return;

    crmLinks.forEach(function(c) {
      rows.push({
        userId: userId,
        userName: usersMap[userId] || ('Пользователь #' + userId),
        dealId: String(c.ID),
        dealName: dealsMap[c.ID] ? dealsMap[c.ID].TITLE : ('Сделка #' + c.ID),
        eventName: e.NAME || '(без названия)',
        dateFrom: e.DATE_FROM,
        dateTo: e.DATE_TO,
        durMin: durMin
      });
    });
  });
  return rows;
}

function updateStats(rows) {
  var events = rows.length;
  var users = {};
  var deals = {};
  var totalMin = 0;
  rows.forEach(function(r) {
    users[r.userId] = 1;
    deals[r.dealId] = 1;
    totalMin += r.durMin;
  });
  document.getElementById('statEvents').textContent = events;
  document.getElementById('statUsers').textContent = Object.keys(users).length;
  document.getElementById('statDeals').textContent = Object.keys(deals).length;
  document.getElementById('statHours').textContent = (totalMin / 60).toFixed(1);
}

function renderTable() {
  var groupBy = document.getElementById('groupBy').value;
  var head = document.getElementById('tableHead');
  var body = document.getElementById('tableBody');

  var columns, rowsFn;

  if (groupBy === 'event') {
    columns = [
      {key:'userName', label:'Сотрудник'},
      {key:'dealName', label:'Сделка'},
      {key:'eventName', label:'Событие'},
      {key:'dateFrom', label:'Начало', type:'date'},
      {key:'dateTo', label:'Конец', type:'date'},
      {key:'durMin', label:'Минуты', type:'num'},
      {key:'durH', label:'Часов', type:'num'}
    ];
    rowsFn = function() {
      return rawData.map(function(r) {
        return Object.assign({}, r, {durH: +(r.durMin/60).toFixed(2)});
      });
    };
  } else if (groupBy === 'user_deal') {
    columns = [
      {key:'userName', label:'Сотрудник'},
      {key:'dealName', label:'Сделка'},
      {key:'cnt', label:'Событий', type:'num'},
      {key:'durMin', label:'Минуты', type:'num'},
      {key:'durH', label:'Часов', type:'num'}
    ];
    rowsFn = function() { return aggregate(['userId','dealId'], rawData); };
  } else if (groupBy === 'user') {
    columns = [
      {key:'userName', label:'Сотрудник'},
      {key:'cnt', label:'Событий', type:'num'},
      {key:'durMin', label:'Минуты', type:'num'},
      {key:'durH', label:'Часов', type:'num'}
    ];
    rowsFn = function() { return aggregate(['userId'], rawData); };
  } else {
    columns = [
      {key:'dealName', label:'Сделка'},
      {key:'cnt', label:'Событий', type:'num'},
      {key:'durMin', label:'Минуты', type:'num'},
      {key:'durH', label:'Часов', type:'num'}
    ];
    rowsFn = function() { return aggregate(['dealId'], rawData); };
  }

  var rows = rowsFn();
  if (sortCol !== null) {
    var key = columns[sortCol].key;
    rows.sort(function(a, b) {
      var av = a[key], bv = b[key];
      if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
      return (av - bv) * sortDir;
    });
  }

  // Заголовок
  var thHtml = '<tr>';
  columns.forEach(function(c, i) {
    var cls = '';
    if (sortCol === i) cls = sortDir === 1 ? 'sort-asc' : 'sort-desc';
    thHtml += '<th class="'+cls+'" onclick="sortBy('+i+')" data-key="'+c.key+'">'+c.label+'</th>';
  });
  thHtml += '</tr>';
  head.innerHTML = thHtml;

  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="'+columns.length+'" class="empty-msg">Нет данных</td></tr>';
    return;
  }

  var tbHtml = '';
  rows.forEach(function(r) {
    tbHtml += '<tr>';
    columns.forEach(function(c) {
      var val = r[c.key];
      if (c.key === 'userName') {
        var initials = val.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
        tbHtml += '<td><div class="employee-cell"><div class="avatar">'+initials+'</div><span>'+esc(val)+'</span></div></td>';
      } else if (c.key === 'dealName') {
        tbHtml += '<td><div class="deal-name" title="'+esc(val)+'">'+esc(val)+'</div></td>';
      } else if (c.type === 'date') {
        tbHtml += '<td>'+esc(formatDate(val))+'</td>';
      } else if (c.type === 'num') {
        var disp = (c.key === 'durH') ? Number(val).toFixed(2) : val;
        tbHtml += '<td class="num">'+disp+'</td>';
      } else {
        tbHtml += '<td>'+esc(val||'')+'</td>';
      }
    });
    tbHtml += '</tr>';
  });
  body.innerHTML = tbHtml;
}

function sortBy(colIdx) {
  if (sortCol === colIdx) { sortDir *= -1; } else { sortCol = colIdx; sortDir = 1; }
  renderTable();
}

function aggregate(keys, rows) {
  var map = {};
  rows.forEach(function(r) {
    var key = keys.map(function(k){return r[k];}).join('__');
    if (!map[key]) {
      var obj = { cnt: 0, durMin: 0 };
      keys.forEach(function(k){obj[k] = r[k];});
      obj.userName = r.userName;
      obj.dealName = r.dealName;
      map[key] = obj;
    }
    map[key].cnt++;
    map[key].durMin += r.durMin;
  });
  return Object.values(map).map(function(o) {
    return Object.assign({}, o, {durH: +(o.durMin/60).toFixed(2)});
  });
}

function exportCSV() {
  var groupBy = document.getElementById('groupBy').value;
  var colMap = {
    event: ['userName','dealName','eventName','dateFrom','dateTo','durMin','durH'],
    user_deal: ['userName','dealName','cnt','durMin','durH'],
    user: ['userName','cnt','durMin','durH'],
    deal: ['dealName','cnt','durMin','durH']
  };
  var labelMap = {
    userName:'Сотрудник', dealName:'Сделка', eventName:'Событие',
    dateFrom:'Начало', dateTo:'Конец', durMin:'Минуты', durH:'Часов', cnt:'Событий'
  };
  var cols = colMap[groupBy];

  var rows;
  if (groupBy === 'event') rows = rawData.map(function(r){return Object.assign({},r,{durH:+(r.durMin/60).toFixed(2)});});
  else if (groupBy === 'user_deal') rows = aggregate(['userId','dealId'], rawData);
  else if (groupBy === 'user') rows = aggregate(['userId'], rawData);
  else rows = aggregate(['dealId'], rawData);

  var BOM = '\uFEFF';
  var lines = [cols.map(function(c){return labelMap[c];}).join(';')];
  rows.forEach(function(r) {
    lines.push(cols.map(function(c) {
      var v = r[c] !== undefined ? r[c] : '';
      if (typeof v === 'string' && (v.indexOf(';') > -1 || v.indexOf('"') > -1 || v.indexOf('\n') > -1)) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      return v;
    }).join(';'));
  });

  var dateFrom = document.getElementById('dateFrom').value;
  var dateTo = document.getElementById('dateTo').value;
  var filename = 'b24_report_' + dateFrom + '_' + dateTo + '.csv';

  var blob = new Blob([BOM + lines.join('\r\n')], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
}

// ---- Вспомогательные функции ----

function callAll(method, params, onSuccess, onError) {
  var all = [];
  var start = 0;
  function next() {
    var p = Object.assign({}, params, {start: start});
    BX24.callMethod(method, p, function(res) {
      if (res.error()) {
        if (onError) onError(res.error().ex.error_description);
        return;
      }
      var data = res.data();
      if (data) all = all.concat(data);
      if (res.more()) { start += 50; next(); }
      else { onSuccess(all); }
    });
  }
  next();
}

function loadDeals(ids, cb) {
  if (!ids.length) { cb(); return; }
  var batches = [];
  for (var i = 0; i < ids.length; i += 50) batches.push(ids.slice(i, i+50));
  var done = 0;
  batches.forEach(function(batch) {
    BX24.callMethod('crm.deal.list', {
      filter: {ID: batch},
      select: ['ID','TITLE','ASSIGNED_BY_ID']
    }, function(res) {
      var data = res.data() || [];
      data.forEach(function(d) { dealsMap[d.ID] = d; });
      done++;
      if (done === batches.length) cb();
    });
  });
}

function loadMissingUsers(ids, cb) {
  var missing = ids.filter(function(id){ return !usersMap[id]; });
  if (!missing.length) { cb(); return; }
  BX24.callMethod('user.get', {ID: missing, select:['ID','NAME','LAST_NAME','SECOND_NAME']}, function(res) {
    var data = res.data() || [];
    data.forEach(function(u) { usersMap[u.ID] = fullName(u); });
    cb();
  });
}

function formatDate(s) {
  if (!s) return '';
  var d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Демо-данные (когда нет BX24) ----
function loadDemoData() {
  usersMap = {'1':'Иванов Алексей','2':'Петрова Марина','3':'Сидоров Денис'};
  dealsMap = {
    '101':{ID:'101',TITLE:'ООО Альфа — поставка'},
    '102':{ID:'102',TITLE:'ИП Бетов — консультация'},
    '103':{ID:'103',TITLE:'АО Гамма — аудит'}
  };
  rawData = [
    {userId:'1',userName:'Иванов Алексей',dealId:'101',dealName:'ООО Альфа — поставка',eventName:'Встреча с клиентом',dateFrom:'2024-04-02T10:00:00',dateTo:'2024-04-02T11:30:00',durMin:90},
    {userId:'1',userName:'Иванов Алексей',dealId:'101',dealName:'ООО Альфа — поставка',eventName:'Демонстрация продукта',dateFrom:'2024-04-05T14:00:00',dateTo:'2024-04-05T15:00:00',durMin:60},
